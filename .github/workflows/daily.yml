name: Daily Commit

on:
  schedule:
    - cron: "17 3 * * *"   # Runs daily at 03:17 UTC
  workflow_dispatch:       # lets you run manually for testing

jobs:
  commit-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: 24f2008965@ds.study.iitm.ac.in step
        run: |
          echo "Last run: $(date)" >> daily-log.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Automated daily commit" || echo "No changes"

      - name: Push changes
        run: git push

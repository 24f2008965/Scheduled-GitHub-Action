name: Daily Commit

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 24f2008965@ds.study.iitm.ac.in step
        run: echo "$(date)" >> log.txt

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add .
          git commit -m "daily commit" || echo done
          git push

name: Daily Commit

permissions:
  contents: write

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  commit-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: 24f2008965@ds.study.iitm.ac.in step
        run: echo "Last run: $(date)" >> daily-log.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "Automated daily commit"

      - name: Push changes
        run: git push
